<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Conversor PDF → EPUB</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f13;
      color: #e2e2e9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2e2e42;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      color: #6b6b85;
      font-size: 0.875rem;
      margin-top: 6px;
    }

    .drop-zone {
      border: 2px dashed #3a3a55;
      border-radius: 12px;
      padding: 40px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: #a78bfa;
      background: rgba(167,139,250,0.05);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .drop-zone p {
      color: #9090aa;
      font-size: 0.9rem;
    }

    .drop-zone span {
      color: #a78bfa;
      font-weight: 600;
    }

    .file-info {
      display: none;
      align-items: center;
      gap: 12px;
      background: #22223a;
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 16px;
    }

    .file-info.visible { display: flex; }

    .file-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .file-details {
      flex: 1;
      min-width: 0;
    }

    .file-details .name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #c4c4da;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-details .size {
      font-size: 0.75rem;
      color: #6b6b85;
      margin-top: 2px;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #6b6b85;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px;
      transition: color 0.2s;
    }

    .remove-btn:hover { color: #f87171; }

    .convert-btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .convert-btn:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .convert-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .progress-wrap {
      display: none;
      margin-top: 20px;
    }

    .progress-wrap.visible { display: block; }

    .progress-label {
      font-size: 0.8rem;
      color: #9090aa;
      margin-bottom: 8px;
    }

    .progress-bar-bg {
      background: #22223a;
      border-radius: 100px;
      height: 6px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      border-radius: 100px;
      background: linear-gradient(90deg, #7c3aed, #3b82f6);
      width: 0%;
      transition: width 0.3s ease;
      animation: indeterminate 1.5s infinite;
    }

    @keyframes indeterminate {
      0%   { transform: translateX(-100%); width: 60%; }
      100% { transform: translateX(200%); width: 60%; }
    }

    .alert {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.875rem;
      align-items: center;
      gap: 10px;
    }

    .alert.visible { display: flex; }
    .alert.error   { background: rgba(248,113,113,0.12); color: #fca5a5; border: 1px solid rgba(248,113,113,0.2); }
    .alert.success { background: rgba(52,211,153,0.12); color: #6ee7b7; border: 1px solid rgba(52,211,153,0.2); }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>PDF → EPUB</h1>
      <p>Convierte tus documentos PDF a formato EPUB fácilmente</p>
    </div>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf,application/pdf" />
      <div class="drop-icon">📄</div>
      <p><span>Haz clic para seleccionar</span> o arrastra un PDF aquí</p>
      <p style="margin-top:6px; font-size:0.78rem; color:#55556a;">Máximo 50 MB</p>
    </div>

    <div class="file-info" id="fileInfo">
      <span class="file-icon">📕</span>
      <div class="file-details">
        <div class="name" id="fileName"></div>
        <div class="size" id="fileSize"></div>
      </div>
      <button class="remove-btn" id="removeBtn" title="Quitar archivo">✕</button>
    </div>

    <button class="convert-btn" id="convertBtn" disabled>Convertir a EPUB</button>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-label">Convirtiendo...</div>
      <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
    </div>

    <div class="alert error" id="alertError">
      <span>⚠️</span>
      <span id="errorMsg"></span>
    </div>
    <div class="alert success" id="alertSuccess">
      <span>✅</span>
      <span id="successMsg"></span>
    </div>
  </div>

  <script>
    const dropZone   = document.getElementById('dropZone');
    const fileInput  = document.getElementById('fileInput');
    const fileInfo   = document.getElementById('fileInfo');
    const fileName   = document.getElementById('fileName');
    const fileSize   = document.getElementById('fileSize');
    const removeBtn  = document.getElementById('removeBtn');
    const convertBtn = document.getElementById('convertBtn');
    const progressWrap = document.getElementById('progressWrap');
    const alertError = document.getElementById('alertError');
    const alertSuccess = document.getElementById('alertSuccess');
    const errorMsg   = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    let selectedFile = null;

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function setFile(file) {
      if (!file || file.type !== 'application/pdf') {
        showError('Por favor selecciona un archivo PDF válido.');
        return;
      }
      if (file.size > 50 * 1024 * 1024) {
        showError('El archivo supera el límite de 50 MB.');
        return;
      }
      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatBytes(file.size);
      fileInfo.classList.add('visible');
      convertBtn.disabled = false;
      hideAlerts();
    }

    function clearFile() {
      selectedFile = null;
      fileInput.value = '';
      fileInfo.classList.remove('visible');
      convertBtn.disabled = true;
      hideAlerts();
    }

    function showError(msg) {
      hideAlerts();
      errorMsg.textContent = msg;
      alertError.classList.add('visible');
    }

    function showSuccess(msg) {
      hideAlerts();
      successMsg.textContent = msg;
      alertSuccess.classList.add('visible');
    }

    function hideAlerts() {
      alertError.classList.remove('visible');
      alertSuccess.classList.remove('visible');
    }

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    removeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      clearFile();
    });

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('dragover');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) setFile(file);
    });

    convertBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      convertBtn.disabled = true;
      progressWrap.classList.add('visible');
      hideAlerts();

      const formData = new FormData();
      formData.append('pdf', selectedFile);

      try {
        const response = await fetch('/convert', { method: 'POST', body: formData });

        if (!response.ok) {
          const data = await response.json();
          throw new Error(data.error || 'Error desconocido al convertir.');
        }

        const blob = await response.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        const name = selectedFile.name.replace(/\.pdf$/i, '.epub');
        a.href = url;
        a.download = name;
        a.click();
        URL.revokeObjectURL(url);

        showSuccess(`¡Conversión exitosa! Se descargó "${name}".`);
      } catch (err) {
        showError(err.message);
      } finally {
        progressWrap.classList.remove('visible');
        convertBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
